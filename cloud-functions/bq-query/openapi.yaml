openapi: 3.0.0
info:
  title: BigQuery Query API
  description: Execute SQL queries against BigQuery and return structured results. Use this tool to explore datasets, run analytical queries, and retrieve data for analysis.
  version: 1.0.0
servers:
  - url: https://europe-west2-mit-consomme-test.cloudfunctions.net
paths:
  /execute-bq-query:
    post:
      summary: Execute a BigQuery SQL query
      operationId: executeQuery
      description: |
        Runs a SQL query against BigQuery in the mit-consomme-test project and returns the results as structured JSON.
        Use standard BigQuery SQL dialect. Table references should be fully qualified: `project.dataset.table`.
        Results are limited to 10,000 rows. Queries are limited to 1 GB of data scanned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sql:
                  type: string
                  description: |
                    The BigQuery SQL query to execute. Must use fully-qualified table names
                    (e.g. `mit-consomme-test.survey_data.ohid_survey_raw`). Supports all BigQuery
                    SQL features including aggregations, window functions, CTEs, and INFORMATION_SCHEMA queries.
              required:
                - sql
      responses:
        '200':
          description: Query executed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  columns:
                    type: array
                    items:
                      type: string
                    description: Column names from the query result.
                  rows:
                    type: array
                    items:
                      type: object
                    description: Array of row objects, each with column names as keys.
                  totalRows:
                    type: integer
                    description: Number of rows returned.
                  jobId:
                    type: string
                    description: BigQuery job ID for reference.
        '400':
          description: Invalid query or request payload. The error message contains the BigQuery error detail.
        '403':
          description: Project not allowed.
